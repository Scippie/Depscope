name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore DepScope.sln

      - name: Build
        run: dotnet build DepScope.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test DepScope.sln --configuration Release --no-build
