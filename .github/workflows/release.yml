name: Build DepScope Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore DepScope.sln

      - name: Build
        run: dotnet build DepScope.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test DepScope.sln --configuration Release --no-build

  build:
    needs: validate
    runs-on: ubuntu-latest

    strategy:
      matrix:
        rid: [win-x64, linux-x64, osx-x64, osx-arm64]

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - name: Publish ${{ matrix.rid }}
        run: |
          dotnet publish DepScope.Desktop/DepScope.Desktop.csproj \
            -c Release \
            -r ${{ matrix.rid }} \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            -o publish/${{ matrix.rid }}

      - name: Archive ${{ matrix.rid }}
        run: |
          cd publish
          zip -r ../DepScope-${{ matrix.rid }}.zip ${{ matrix.rid }}
          cd ..
          sha256sum DepScope-${{ matrix.rid }}.zip > DepScope-${{ matrix.rid }}.zip.sha256

      - name: Upload artifact ${{ matrix.rid }}
        uses: actions/upload-artifact@v7
        with:
          name: DepScope-${{ matrix.rid }}
          path: |
            DepScope-${{ matrix.rid }}.zip
            DepScope-${{ matrix.rid }}.zip.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Build release notes from changelog
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          NOTES_FILE="release-notes.md"

          {
            echo "## DepScope ${GITHUB_REF_NAME}"
            echo
            awk -v version="$VERSION" '
              $0 ~ "^## \\[" version "\\]" { found = 1; next }
              found && /^## \[/ { exit }
              found { print }
            ' CHANGELOG.md
          } > "$NOTES_FILE"

          if [ "$(wc -l < "$NOTES_FILE")" -le 2 ]; then
            {
              echo "## DepScope ${GITHUB_REF_NAME}"
              echo
              echo "No matching CHANGELOG.md section was found for ${GITHUB_REF_NAME}."
            } > "$NOTES_FILE"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          body_path: release-notes.md
          files: |
            artifacts/**/DepScope-*.zip
            artifacts/**/DepScope-*.zip.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
